    <script>
      // Theme FOUC prevention — runs synchronously before any paint. Mirrors the
      // runtime provider in src/theme/provider.tsx. Keep the storage key and
      // attribute in sync with THEME_STORAGE_KEY / THEME_ATTRIBUTE.
      (function () {
        try {
          var stored = localStorage.getItem("avark.theme");
          var pref =
            stored === "light" || stored === "dark" || stored === "system"
              ? stored
              : "system";
          var resolved =
            pref === "system"
              ? window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark"
              : pref;
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
